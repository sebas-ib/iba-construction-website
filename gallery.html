<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Gallery - IBA Construction</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mediaqueries.css" />
  </head>
  <body>
    <!-- Navigation Bar (Same as on your main page) -->
    <nav id="desktop-nav">
      <div class="logo">
        <a href="index.html#home">IBA Construction</a>
      </div>
      <div>
        <ul class="nav-links">
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#services">Services</a></li>
          <li><a href="#gallery">Gallery</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>
      </div>
    </nav>

    <!-- Hamburger Navigation for smaller screens -->
    <nav id="hamburger-nav">
      <div class="logo">
        <a href="index.html#home">IBA Construction</a>
      </div>
      <div class="hamburger-menu">
        <!-- Menu links that will be toggled -->
        <ul class="menu-links">
          <li><a href="index.html#about" onclick="toggleMenu()">About</a></li>
          <li>
            <a href="index.html#services" onclick="toggleMenu()">Services</a>
          </li>
          <li><a href="#gallery" onclick="toggleMenu()">Gallery</a></li>
          <li>
            <a href="index.html#contact" onclick="toggleMenu()">Contact</a>
          </li>
        </ul>

        <!-- Hamburger icon to toggle the menu -->
        <div class="hamburger-icon" onclick="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </nav>

    <!-- Gallery Section -->
    <section id="gallery">
      <div class="section-box">
        <h1 class="header">Gallery</h1>

          <img src="assets/IMG_0007.jpg" alt="Project 5" class="gallery-img" />
          <img src="assets/IMG_0008.jpg" alt="Project 6" class="gallery-img" />
          <img src="assets/IMG_0009.jpg" alt="Project 7" class="gallery-img" />
          <img src="assets/IMG_0011.jpg" alt="Project 8" class="gallery-img" />
          <img src="assets/IMG_0025.jpg" alt="Project 9" class="gallery-img" />
          <img src="assets/IMG_0016.jpg" alt="Project 10" class="gallery-img" />
          <img src="assets/IMG_0017.jpg" alt="Project 11" class="gallery-img" />
          <img src="assets/IMG_0019.jpg" alt="Project 12" class="gallery-img" />
          <img src="assets/IMG_0020.jpg" alt="Project 13" class="gallery-img" />
          <img src="assets/IMG_0023.jpg" alt="Project 14" class="gallery-img" />
          <img src="assets/IMG_0024.jpg" alt="Project 15" class="gallery-img" />
